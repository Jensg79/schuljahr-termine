name: Tägliche Signal-Nachricht

on:
  schedule:
  - cron: '0 5 * 4-10 1-5'  # Sommerzeit (ca. April–Oktober)
  - cron: '0 6 * 1-3,11-12 1-5'  # Winterzeit
  workflow_dispatch:

jobs:
  send-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Termine lesen und Signal senden
        env:
          SIGNAL_PHONE:  ${{ secrets.SIGNAL_PHONE }}
          SIGNAL_APIKEY: ${{ secrets.SIGNAL_APIKEY }}
          HIGHLIGHT_TAGS: "Mathematik"
        run: python3 .github/scripts/send_reminder.py
