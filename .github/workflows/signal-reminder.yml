name: Tägliche Signal-Nachricht

on:
  schedule:
    - cron: '30 9 * * 1-5'  # Mo–Fr, 08:00 MESZ / 07:00 MEZ (kein Wochenende)
  workflow_dispatch:

jobs:
  send-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Termine lesen und Signal senden
        env:
          SIGNAL_PHONE:  ${{ secrets.SIGNAL_PHONE }}
          SIGNAL_APIKEY: ${{ secrets.SIGNAL_APIKEY }}
          HIGHLIGHT_TAGS: "Mathematik"
        run: python3 .github/scripts/send_reminder.py
