name: Tägliche Signal-Nachricht

on:
  schedule:
    - cron: '0 6 * * *'  # 08:00 MESZ / 07:00 MEZ
  workflow_dispatch:

jobs:
  send-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

     - name: Termine lesen und Signal senden
    env:
      SIGNAL_PHONE: ${{ secrets.SIGNAL_PHONE }}
      SIGNAL_APIKEY: ${{ secrets.SIGNAL_APIKEY }}
    run: python3 .github/scripts/send_reminder.py
    continue-on-error: true

    - name: Notify on failure
      if: failure()
      run: echo "Signal reminder failed at $(date)"
